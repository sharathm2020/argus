# Argus frontend nginx config
server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the React SPA — fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* requests to the backend container (resolved by Docker DNS)
    location /api/ {
        proxy_pass http://argus.railway.internal:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Allow long-running requests (analysis can take up to 3 minutes)
        proxy_read_timeout 200s;
        proxy_send_timeout 200s;
    }

    # Proxy /health to backend for container health checks
    location /health {
        proxy_pass http://backend:8000/health;
    }
}
